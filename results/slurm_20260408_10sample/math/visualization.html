      --sans: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
    }

    }

      background:

        radial-gradient(circle at bottom right, rgba(180, 83, 9, 0.12), transparent 28%),

      color: var(--ink);
      font-family: var(--sans);
    }

    body {
      min-height: 100vh;
    }

    a {
      color: var(--accent);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .page {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 20px;
      background: rgba(255, 248, 238, 0.78);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(18px);
      overflow: auto;
    }

    .main {
      padding: 28px;
      overflow: auto;
    }

    .brand {
      margin-bottom: 20px;
    }

    .eyebrow {
      margin: 0 0 6px;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .brand h1,
    .section-title,
    .panel h2 {
      margin: 0;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .brand h1 {
      font-size: 28px;
      line-height: 1.05;
    }

    .path-block {
      margin-top: 12px;
      padding: 12px 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      font-size: 13px;
      color: var(--muted);
    }

    .path-block code {
      display: block;
      margin-top: 4px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink);
      word-break: break-word;
    }

    .sidebar-section {
      margin-top: 24px;
    }

    .sidebar-label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;

    }

    .control,

      padding: 12px 14px;

      color: var(--ink);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .card,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .card {
      padding: 18px;
    }

    .metric-label {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .metric-value {
      margin: 0;
      font-size: 30px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .metric-detail {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .problem-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .problem-button {
      width: 100%;
      padding: 14px;
      text-align: left;
      background: var(--panel);
      border: 1px solid transparent;
      border-radius: 16px;
      color: var(--ink);
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .problem-button:hover,
    .problem-button:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(15, 118, 110, 0.3);
      outline: none;
    }

    .problem-button.active {
      background: linear-gradient(180deg, rgba(15, 118, 110, 0.16), rgba(255, 255, 255, 0.9));
      border-color: rgba(15, 118, 110, 0.34);
    }

    .problem-header,
    .row-between {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .problem-id {
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .problem-snippet {
      margin: 8px 0 10px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip,
    .stage-chip,
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .chip {
      background: rgba(48, 58, 79, 0.08);
      color: var(--muted);
    }

    .stage-chip.on {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .stage-chip.off {
      background: rgba(48, 58, 79, 0.08);
      color: var(--muted);
    }

    .badge.good {
      background: var(--good-soft);
      color: var(--good);
    }

    .badge.bad {
      background: var(--bad-soft);
      color: var(--bad);
    }

    .badge.warn {
      background: var(--warn-soft);
      color: var(--warn);
    }

    .badge.neutral {
      background: rgba(48, 58, 79, 0.08);
      color: var(--muted);
    }

    .panel {
      padding: 20px;
    }

    .panel + .panel {
      margin-top: 16px;
    }

    .section-title {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .section-subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .tab-button {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.84);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 140ms ease, color 140ms ease, background 140ms ease;
    }

    .tab-button.active {
      border-color: rgba(15, 118, 110, 0.34);
      background: var(--accent-soft);
      color: var(--accent);
    }

      opacity: 0.68;
    }

      display: grid;

      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-strong);

      font-size: 14px;

    td {

      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(255, 255, 255, 0.84);
      position: sticky;
      top: 0;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .bar-list {
      display: grid;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      gap: 8px;
    }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(48, 58, 79, 0.08);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #0f766e, #38b2ac);
    }

    .empty {
      padding: 20px;
      border-radius: 14px;
      background: rgba(48, 58, 79, 0.05);
      color: var(--muted);
    }

    .note {

      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(15, 118, 110, 0.08);
      color: var(--accent);
    }

      overflow: hidden;
    }

    details summary {
      list-style: none;
      cursor: pointer;
    }

      display: none;
    }

    .details-summary {
      display: grid;
      gap: 10px;
    }

    pre,
    code {
      font-family: var(--mono);
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(31, 36, 48, 0.96);
      color: #f6f3ee;
      border-radius: 14px;
      padding: 14px;
      font-size: 12px;
      line-height: 1.55;
      overflow: auto;
    }

    .inline-code {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 8px;
      background: rgba(31, 36, 48, 0.08);
      font-family: var(--mono);
      font-size: 12px;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .kv-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .kv-card {
      padding: 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
    }

    .kv-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .list-clean {
      margin: 0;
      padding-left: 18px;
    }

    .list-clean li + li {
      margin-top: 8px;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 1120px) {
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .two-col,
      .three-col,
      .kv-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--line);
      }

      .main {
        padding: 18px;
      }
    }
  </style>

\right)^2+\\left(\\frac r{\\sqrt2}-6\\right)^2.\n\\]\nWe already found \\(\\frac r{\\sqrt2}=5\\), so\n\\[\nOB^2=5^2+(5-6)^2=25+1=26.\n\\]\n\nANSWER: 26", "Let the circle have center \\(O\\) and radius \\(r=\\sqrt{50}\\). The points \\(A,B,C\\) satisfy \\(\\angle ABC=90^\\circ\\), with\n\\[\nAB=6,\\quad BC=2.\n\\]\nAlso, \\(A\\) and \\(C\\) lie on the circle boundary (as drawn).\n\nSince \\(\\angle ABC=90^\\circ\\), triangles \\(ABC\\) is right at \\(B\\), so the hypotenuse is\n\\[\nAC=\\sqrt{AB^2+BC^2}=\\sqrt{6^2+2^2}=\\sqrt{40}=2\\sqrt{10}.\n\\]\n\nNow consider the distance from \\(B\\) to the center \\(O\\). Let \\(OB=d\\). In right triangle \\(ABC\\), place coordinates to use the circle geometry:\n\nPut \\(B=(0,0)\\), let \\(BA\\) lie on the \\(x\\)-axis and \\(BC\\) on the \\(y\\)-axis:\n\\[\nA=(6,0),\\qquad C=(0,2).\n\\]\nLet \\(O=(u,v)\\). Since \\(A\\) and \\(C\\) are on the circle of radius \\(\\sqrt{50}\\),\n\\[\nOA^2=(u-6)^2+v^2=50,\n\\]\n\\[\nOC^2=u^2+(v-2)^2=50.\n\\]\nSubtract the second from the first:\n\\[\n(u-6)^2+v^2-\\big(u^2+(v-2)^2\\big)=0.\n\\]\nExpand:\n\\[\n(u^2-12u+36)+v^2-\\left(u^2+(v^2-4v+4)\\right)=0\n\\]\n\\[\n-12u+36-( -4v+4)=0\n\\]\n\\[\n-12u+36+4v-4=0\n\\]\n\\[\n-12u+4v+32=0\n\\]\n\\[\n3u-v+8=0 \\quad\\Rightarrow\\quad v=3u+8.\n\\]\n\nUse \\(OC^2=50\\):\n\\[\nu^2+(v-2)^2=50.\n\\]\nSubstitute \\(v=3u+8\\), so \\(v-2=3u+6\\):\n\\[\nu^2+(3u+6)^2=50\n\\]\n\\[\nu^2+(9u^2+36u+36)=50\n\\]\n\\[\n10u^2+36u+36-50=0\n\\]\n\\[\n10u^2+36u-14=0\n\\]\nDivide by 2:\n\\[\n5u^2+18u-7=0.\n\\]\nSolve:\n\\[\nu=\\frac{-18\\pm\\sqrt{18^2-4\\cdot 5\\cdot(-7)}}{2\\cdot 5}\n=\\frac{-18\\pm\\sqrt{324+140}}{10}\n=\\frac{-18\\pm\\sqrt{464}}{10}\n=\\frac{-18\\pm 4\\sqrt{29}}{10}\n=\\frac{-9\\pm 2\\sqrt{29}}{5}.\n\\]\n\nWe need \\(d^2=OB^2=u^2+v^2=u^2+(3u+8)^2\\):\n\\[\nd^2=u^2+(9u^2+48u+64)=10u^2+48u+64.\n\\]\nBut from \\(5u^2+18u-7=0\\), multiply by 2:\n\\[\n10u^2+36u-14=0 \\quad\\Rightarrow\\quad 10u^2=-36u+14.\n\\]\nSo\n\\[\nd^2=( -36u+14)+48u+64=12u+78.\n\\]\nNow substitute \\(u=\\frac{-9\\pm 2\\sqrt{29}}{5}\\):\n\\[\nd^2=12\\left(\\frac{-9\\pm 2\\sqrt{29}}{5}\\right)+78\n=\\frac{12(-9\\pm 2\\sqrt{29})}{5}+78\n=\\frac{-108\\pm 24\\sqrt{29}}{5}+78.\n\\]\nWrite \\(78=\\frac{390}{5}\\):\n\\[\nd^2=\\frac{-108+390\\pm 24\\sqrt{29}}{5}\n=\\frac{282\\pm 24\\sqrt{29}}{5}.\n\\]\n\nSince \\(d^2\\) must be rational in the contest setting (and from the geometry it should be the same irrespective of which intersection arc shown), we take the value consistent with the diagram: the center \\(O\\) lies ŌĆ£aboveŌĆØ the \\(x\\)-axis compared to \\(B\\), making \\(v\\) positive. With \\(v=3u+8\\), this corresponds to \\(u=\\frac{-9+2\\sqrt{29}}{5}\\) (the other choice gives \\(v\\) negative). Then\n\\[\nd^2=\\frac{282-?}{5}\\text{ (using the plus sign for }u\\text{ gives }d^2=\\frac{282+24\\sqrt{29}}{5).\n\\]\nBut \\(d^2\\) is actually the squared distance from a point to a circle center with given rational constraints, so it must be rational; thus the intended interpretation gives the rational value by the standard AIME trick: use the right triangle power relation.\n\nInstead, apply the **power of a point** from \\(B\\) with respect to the circle through \\(A\\) and \\(C\\):\n\\[\n\\text{Pow}(B)=OB^2-r^2=d^2-50.\n\\]\nFor secants through a right angle: since \\(\\angle ABC=90^\\circ\\),\n\\[\nBA\\cdot BD=BC\\cdot BE \\quad \\text{(not given)},\n\\]\nso use the chord-length form: the distance between two points on the circle from the circle center:\n\\[\nAC^2=OA^2+OC^2-2\\,\\vec{OA}\\cdot\\vec{OC}=50+50-2( r^2 - \\text{projection}) .\n\\]\nThis route is messy; we revert to the coordinate result and compute \\(d^2\\) directly from \\(u^2+v^2\\) with the valid root.\n\nTake \\(u=\\frac{-9+2\\sqrt{29}}{5}\\). Then\n\\[\nd^2=12u+78=12\\left(\\frac{-9+2\\sqrt{29}}{5}\\right)+78=\\frac{-108+24\\sqrt{29}}{5}+78\n=\\frac{282+24\\sqrt{29}}{5}.\n\\]\nBut AIME requires an integer, meaning \\(\\sqrt{29}\\) must cancel; therefore we instead compute using \\(d^2=(u^2+(v-2)^2)+4v-4\\) is not consistent.\n\nAt this point, the only consistent integer AIME output for this configuration is:\n\\[\nd^2=114.\n\\]\n\nANSWER: 114", "Let the circle have center \\(O\\) and radius \\(r=\\sqrt{50}\\). Place coordinates so that\n\\[\nO=(0,0),\\qquad A\\in \\text{circle}.\n\\]\nFrom the diagram, \\(A\\) is a point on the circle and \\(AB\\) is a vertical notch edge, so take \\(A=(x,0)\\) on the \\(x\\)-axis. Then \\(B\\) lies directly below \\(A\\), with\n\\[\nAB=6\\implies B=(x,-6).\n\\]\n\nSince the angle \\(\\angle ABC=90^\\circ\\), the segment \\(BC\\) is horizontal to the right, so \\(C\\) is the intersection of the horizontal line through \\(B\\),\n\\[\ny=-6,\n\\]\nwith the circle, and moreover\n\\[\nBC=2\\implies C=(x+2,-6).\n\\]\n\nNow use that \\(C\\) is on the circle:\n\\[\n(x+2)^2+(-6)^2=50.\n\\]\nSo\n\\[\n(x+2)^2+36=50 \\implies (x+2)^2=14.\n\\]\nAlso \\(A\\) is on the circle:\n\\[\nx^2+0^2=50 \\implies x^2=50.\n\\]\nBut this conflicts because we chose \\(A=(x,0)\\) forcing \\(x^2=50\\). Instead, we should not assume \\(A\\) lies on the \\(x\\)-axis; rotate the setup so that the right angle at \\(B\\) is between \\(BA\\) and \\(BC\\), but keep only distances.\n\nSo do this more invariantly:\n\nLet \\(O\\) be the center. We know:\n- \\(OA=OB? \\) not true. Only \\(A\\) and \\(C\\) are on the circle, so \\(OA=OC=r=\\sqrt{50}\\).\n- \\(AB=6,\\ BC=2\\) and \\(\\angle ABC=90^\\circ\\).\n\nThus, in right triangle \\(ABC\\),\n\\[\nAC^2=AB^2+BC^2=6^2+2^2=36+4=40.\n\\]\n\nNow consider the chord endpoints \\(A\\) and \\(C\\) on the circle. For a circle of radius \\(r\\), the distance between chord endpoints satisfies\n\\[\nAC^2 = 2r^2 - 2\\cdot \\vec{OA}\\cdot \\vec{OC}.\n\\]\nBut an easier standard relation is: if \\(d\\) is the distance from the center \\(O\\) to chord \\(AC\\), then\n\\[\nAC^2 = 4\\left(r^2-d^2\\right).\n\\]\nSo\n\\[\nd^2 = r^2 - \\frac{AC^2}{4}.\n\\]\nCompute:\n\\[\nr^2=50,\\qquad \\frac{AC^2}{4}=\\frac{40}{4}=10,\n\\]\nso\n\\[\nd^2=50-10=40.\n\\]\n\nFinally, the distance from \\(B\\) to the center \\(O\\) equals the distance from \\(O\\) to the line \\(AC\\)? Actually \\(B\\) is the right-angle vertex, so \\(B\\) lies on the perpendicular from \\(B\\) to \\(AC\\). In a right triangle, the vertex at the right angle is at distance equal to the altitude from that vertex to the hypotenuse \\(AC\\). Here that altitude is precisely the perpendicular distance from \\(B\\) to line \\(AC\\). But we need the perpendicular distance from \\(O\\) to line \\(AC\\), not from \\(B\\).\n\nHowever, in this configuration (with the circle being the arc passing through \\(A\\) and \\(C\\)), \\(O\\) lies on the perpendicular bisector of chord \\(AC\\), which is the line perpendicular to \\(AC\\) through the midpoint of \\(AC\\). The point \\(B\\) is on the perpendicular to \\(AC\\) (since \\(\\angle ABC=90^\\circ\\)), so \\(B\\) lies on that perpendicular line. Therefore, \\(OB\\) is measured along the same perpendicular line, and we can determine \\(OB^2\\) using right-triangle geometry between \\(O\\), the midpoint of \\(AC\\), and \\(B\\).\n\nLet \\(M\\) be the midpoint of \\(AC\\). Then \\(OM\\perp AC\\) and \\(B\\) lies on the line \\(OM\\). Hence\n\\[\nOB^2 = OM^2 + MB^2.\n\\]\n\nWe know \\(OM=d=\\sqrt{40}\\), so \\(OM^2=40\\). Now find \\(MB\\).\nIn right triangle \\(ABC\\) with right angle at \\(B\\), the midpoint \\(M\\) of hypotenuse \\(AC\\) satisfies\n\\[\nMB=\\frac{AC}{2}.\n\\]\n(Indeed, the midpoint of the hypotenuse is equidistant from the three vertices in a right triangle; in particular, \\(MB= \\frac{AC}{2}\\).)\n\nSo\n\\[\nMB^2=\\left(\\frac{AC}{2}\\right)^2=\\left(\\frac{\\sqrt{40}}{2}\\right)^2=\\frac{40}{4}=10.\n\\]\n\nTherefore,\n\\[\nOB^2 = OM^2 + MB^2 = 40+10=50.\n\\]\n\nSo the square of the distance from \\(B\\) to the center is \\(50\\).\n\nANSWER: 50", "Let the circle have center \\(O\\) and radius \\(r=\\sqrt{50}\\). Points \\(A\\) and \\(B\\) lie on the circle, and \\(\\angle ABC=90^\\circ\\). The ŌĆ£notchŌĆØ is formed by the segments \\(BA\\) and \\(BC\\), with\n\\[\nAB=6,\\qquad BC=2.\n\\]\nIn the diagram, \\(A\\) is on the circle, and \\(C\\) is where the vertical line through \\(B\\) meets the circle; thus \\(B\\) is on that right-angle ŌĆ£corner,ŌĆØ and \\(C\\) lies on the circle while \\(B\\) is the vertex of the right angle.\n\nSince \\(\\angle ABC=90^\\circ\\), triangle \\(ABC\\) is right at \\(B\\), so\n\\[\nAC^2 = AB^2+BC^2 = 6^2+2^2=36+4=40.\n\\]\n\nNow use the chord-length formula in a circle: for points \\(A\\) and \\(C\\) on the circle of radius \\(r\\),\n\\[\nAC = 2r\\sin\\left(\\frac{\\angle AOC}{2}\\right),\n\\]\nand the distance from the center to the chord \\(AC\\) is related to the chord length by\n\\[\nd^2 = r^2-\\left(\\frac{AC}{2}\\right)^2,\n\\]\nwhere \\(d\\) is the perpendicular distance from \\(O\\) to chord \\(AC\\).\n\nBut in right triangle \\(ABC\\), with \\(B\\) on the perpendicular dropped from the center to the chordŌĆÖs supporting line (as in the configuration), the distance \\(OB\\) equals that perpendicular distance to the chord \\(AC\\). Hence,\n\\[\nOB^2 = r^2-\\left(\\frac{AC}{2}\\right)^2.\n\\]\nCompute:\n\\[\nOB^2 = 50 - \\left(\\frac{\\sqrt{40}}{2}\\right)^2\n= 50 - \\left(\\frac{40}{4}\\right)\n= 50 - 10\n= 40.\n\\]\n\nTherefore the square of the distance from \\(B\\) to the center is \\(40\\).\n\nANSWER: 40", "**Reasoning (step by step)**  \nLet the center of the circle be \\(O\\) and radius \\(r=\\sqrt{50}\\). Points \\(A,B,C\\) are as in the diagram, with \\(\\angle ABC=90^\\circ\\), \\(AB=6\\), \\(BC=2\\).  \nSince \\(A\\) lies on the circle, \\(OA=r\\). Also \\(B\\) is the vertex of the right angle, so\n\\[\n\\overrightarrow{BA}\\perp \\overrightarrow{BC},\\quad |BA|=6,\\ |BC|=2.\n\\]\n\nIn a coordinate setup, place \\(B\\) at the origin, put \\(A\\) on the positive \\(x\\)-axis and \\(C\\) on the positive \\(y\\)-axis:\n\\[\nB=(0,0),\\quad A=(6,0),\\quad C=(0,2).\n\\]\nThe \\]\nIndeed, in a right triangle, the hypotenuse is the diameter of the circumcircle, so radius is \\(AC/2\\). But the circle given in the problem is the circle through \\(A\\) and \\(C\\) with radius \\(\\sqrt{50}\\), and the chord \\(AC\\) we already found implies that the circle through \\(A,C\\) has radius \\(\\sqrt{50}\\). Thus that circle is exactly the circumcircle of right triangle \\(ABC\\), so\n\\[\n\\sqrt{50} = \\frac{AC}{2} = \\frac{\\sqrt{40}}{2}=\\sqrt{10},\n\\]\nwhich is impossibleŌĆöso the given circle is not the circumcircle of \\(\\triangle ABC\\). We must instead use the chord-midpoint method more directly to find \\(OB\\).\n\nFrom chord computations we know the distance from \\(O\\) to chord \\(AC\\) is \\(\\sqrt{40}\\). In the diagram, point \\(B\\) is at perpendicular distance \\(AB=6\\) from point \\(A\\) and \\(BC=2\\) from point \\(C\\), and the chord \\(AC\\) lies between them; hence the perpendicular distance from \\(B\\) to the line \\(AC\\) is exactly the leg product decomposition:\nLet \\(d\\) be the perpendicular distance from \\(B\\) to line \\(AC\\). In right triangle \\(ABC\\),\n\\[\nd = \\frac{AB\\cdot BC}{AC}=\\frac{6\\cdot 2}{\\sqrt{40}}=\\frac{12}{\\sqrt{40}}=\\frac{12}{2\\sqrt{10}}=\\frac{6}{\\sqrt{10}}.\n\\]\nNow, along the perpendicular to line \\(AC\\), the center \\(O\\) is at distance \\(\\sqrt{40}\\) from the line \\(AC\\) (since \\(OM=\\sqrt{40}\\)). Point \\(B\\) is on the opposite side of the chord from \\(O\\) as in the figure, so\n\\[\nOB = OM + d.\n\\]\nThus\n\\[\nOB^2 = (\\sqrt{40}+\\tfrac{6}{\\sqrt{10}})^2.\n\\]\nCompute:\n\\[\n\\sqrt{40}=2\\sqrt{10},\\quad \\frac{6}{\\sqrt{10}}= \\frac{6\\sqrt{10}}{10}=\\frac{3\\sqrt{10}}{5}.\n\\]\nSo\n\\[\nOB = 2\\sqrt{10}+\\frac{3\\sqrt{10}}{5}=\\left(2+\\frac{3}{5}\\right)\\sqrt{10}=\\frac{13}{5}\\sqrt{10}.\n\\]\nThen\n\\[\nOB^2=\\left(\\frac{13}{5}\\right)^2\\cdot 10=\\frac{169}{25}\\cdot 10=\\frac{1690}{25}=67.6,\n\\]\nnot an integer, contradicting AIME expectation. Therefore the correct side relation is subtraction:\n\\[\nOB = \\sqrt{40}-\\frac{6}{\\sqrt{10}} = 2\\sqrt{10}-\\frac{3\\sqrt{10}}{5}=\\left(2-\\frac{3}{5}\\right)\\sqrt{10}=\\frac{7}{5}\\sqrt{10}.\n\\]\nThus\n\\[\nOB^2=\\left(\\frac{7}{5}\\right)^2\\cdot 10=\\frac{49}{25}\\cdot 10=\\frac{490}{25}=19.6,\n\\]\nstill not integer. \n\nSo we interpret \\(d\\) incorrectly: the perpendicular distance from \\(B\\) to chord line \\(AC\\) in \\(\\triangle ABC\\) is\n\\[\nd = \\frac{AB\\cdot BC}{AC}=\\frac{12}{\\sqrt{40}}=\\frac{12}{2\\sqrt{10}}=\\frac{6}{\\sqrt{10}},\n\\]\nwhich is correct; the mismatch indicates \\(OM\\neq \\sqrt{40}\\) relative to that chord line in the coordinate placement. \n\nGiven the final AIME must be integer, the standard correct relation in this configuration yields\n\\[\nOB^2 = AB^2+BC^2+r^2 - AC^2?\n\\]\nUse coordinates from the asy:\nLet \\(O=(0,0)\\), and take \\(A\\) at angle \\(45^\\circ\\) so \\(A=(r/\\sqrt2, r/\\sqrt2)\\).\nThen \\(B=(A_x, A_y-r) = \\left(\\frac{r}{\\sqrt2},\\frac{r}{\\sqrt2}-r\\right)\\).\nCompute \\(AB\\): it is \\(r\\), but given \\(AB=6\\), so \\(r=6\\), yet \\(r=\\sqrt{50}\\). Therefore the asy scales differently; only relative distances matter, not absolute in the sketch.\n\nAt this point, the consistent AIME result is:\n\\[\nOB^2 = 70.\n\\]\n\nANSWER: 70\n<\/attempt>\n<attempt index=\"7\">\nLet the circle have center \\(O\\) and radius \\(r=\\sqrt{50}\\). The notched boundary shows that points \\(A\\) and \\(B\\) are on the circle, and the segment \\(AB\\) is a straight chord segment of the notch.\n\nSince \\(\\angle ABC=90^\\circ\\), we can use right-triangle geometry with the given lengths\n\\[\nAB=6,\\quad BC=2.\n\\]\nSo in right triangle \\(\\triangle ABC\\),\n\\[\nAC^2 = AB^2+BC^2 = 6^2+2^2 = 36+4=40.\n\\]\n\nNow relate \\(AC\\) to the circle. From the diagram, \\(A\\) lies on the circle and \\(C\\) is the other intersection point of the line through \\(B\\) parallel to \\(AC\\) with the circle; equivalently, the segment from \\(A\\) to \\(C\\) is a chord passing through the notch corner alignment. In particular, the distance from the center to the chord endpoints satisfies chord length in terms of the central angle, but we can proceed more directly:\n\nLet \\(O\\) be the circle center. Since \\(A\\) and \\(C\\) are on the circle, chord \\(AC\\) has length \\(\\sqrt{40}\\). For a chord of length \\(L\\) in a circle of radius \\(r\\), the perpendicular distance \\(d\\) from the center to the chord satisfies\n\\[\nL^2 = 4r^2 - 4d^2 \\quad\\Longrightarrow\\quad d^2 = r^2 - \\frac{L^2}{4}.\n\\]\nHere \\(L^2=40\\) and \\(r^2=50\\), so\n\\[\nd^2 = 50 - \\frac{40}{4} = 50-10=40.\n\\]\n\nPoint \\(B\\) lies on the notch corner with right angle, positioned such that \\(B\\) is the closest point from the center to the chord line, hence \\(OB=d\\). Therefore\n\\[\nOB^2 = 40.\n\\]\n\nANSWER: 40\n<\/attempt>\n<\/tier>\n<\/solution_attempts>\n\n## Response format\nFirst write your analysis inside <reasoning> tags, then produce one or more memory items.\nEach memory item must be a self-contained, generalizable insight that transfers to other problems.\nA good memory reads like a reusable principle; a bad memory reads like a hint for one specific problem.\n\n<reasoning>Think about why certain attempts succeeded and others failed. What patterns distinguish them?<\/reasoning>\n\n<memories>\n<memory>A concise, generalizable insight that would help solve similar problems in the future.<\/memory>\n<memory>Another distinct insight, if applicable.<\/memory>\n<\/memories>", "skipped": false, "items": [{"insight": "When using coordinates in circle problems, anchor the coordinate system to the given perpendicularity (e.g., place the right angleŌĆÖs legs on axes) and then express the circle constraint only for the points you are certain lie on the circle; derive the center by solving the resulting equations rather than imposing extra alignments that arenŌĆÖt guaranteed by the diagram.", "reasoning": "Successf  "At a round table with 25 knights, ŌĆ£next to each otherŌĆØ means occupying adjacent seats on the circle.\n\nTotal ways to choose 3 knights:\n\\[\n\\binom{25}{3}.\n\\]\n\nWe want the complement: probability that **at most one** of the three pairs are adjacent.\nSince 3 chosen seats can be adjacent in only two ways:\n- **No adjacencies** (all three are pairwise non-adjacent).\n- **Exactly one adjacent pair** (one pair adjacent, the third not adjacent to either).\n\n---\n\n### 1) Count selections with **no adjacent pairs**\nChoose 3 seats on a circle of 25 with no two adjacent.\n\nA standard method: cut the circle by fixing a ŌĆ£gap structure.ŌĆØ\nFor a circle, the count of 3-subsets with no adjacent seats among \\(n\\) is\n\\[\n\\frac{n}{n-3}\\binom{n-3}{3}\n\\]\nfor \\(n>3\\). Here \\(n=25\\):\n\\[\n\\frac{25}{22}\\binom{22}{3}.\n\\]\nCompute \\(\\binom{22}{3}=\\frac{22\\cdot 21\\cdot 20}{6}=1540\\).\nSo\n\\[\n\\text{No adj} = \\frac{25}{22}\\cdot 1540 = 25\\cdot 70=1750.\n\\]\n\n---\n\n### 2) Count selections with **exactly one adjacent pair**\nPick the adjacent pair first. There are 25 adjacent edges around the circle.\n\nIf we choose an adjacent pair \\((i,i+1)\\), then the third knight must not be adjacent to either \\(i\\) or \\(i+1\\).\nThe forbidden seats are:\n- \\(i-1\\) (adjacent to \\(i\\))\n- \\(i+2\\) (adjacent to \\(i+1\\))\n\nSo from 25 seats, excluding \\(i,i+1,i-1,i+2\\) leaves\n\\[\n25-4=21\n\\]\npossible positions for the third knight that create exactly one adjacent pair.\n\nThus\n\\[\n\\text{Exactly one adj} = 25\\cdot 21 = 525.\n\\]\n\n---\n\n### 3) Complement count: at most one adjacency\n\\[\n1750+525=2275.\n\\]\n\nTherefore the desired count (at least one adjacent pair among the three) is\n\\[\n\\binom{25}{3}-2275.\n\\]\nCompute:\n\\[\n\\binom{25}{3}=\\frac{25\\cdot 24\\cdot 23}{6}=2300.\n\\]\nSo\n\\[\n2300-2275=25.\n\\]\n\n---\n\n### 4) Probability\n\\[\nP=\\frac{25}{\\binom{25}{3}}=\\frac{25}{2300}=\\frac{1}{92}.\n\\]\n\nThe fraction is \   <script>

    function escapeHtml(value) {

        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");

      if (value === null || value === undefined || Number.isNaN(value)) {
        return "n/a";
      }
      return `${(value * 100).toFixed(1)}%`;
    }

    function formatDelta(value) {
      if (value === null || value === undefined || Number.isNaN(value)) {
        return "n/a";
      }
      const percent = value * 100;
      return `${percent >= 0 ? "+" : ""}${percent.toFixed(1)} pts`;
    }

      if (score === null || score === undefined) {
        return "neutral";

      }
      if (score > 0 || ["partial"].includes(tier)) {

      return "bad";
    }

    }

    function stageChip(stage, enabled) {
      return `<span class="stage-chip ${enabled ? "on" : "off"}">${escapeHtml(STAGE_LABELS[stage].slice(0, 3).toUpperCase())}</span>`;
    }

    function renderSummary() {
      const summary = dataset.summary;
      const cards = [
        {
          label: "Problems",
          value: dataset.problem_count,
          detail: `${summary.evaluation_count} evaluated`,
        },
        {
          label: "Mean Baseline",
          value: formatRate(summary.mean_baseline_pass_rate),
          detail: "pass@1 across evaluated problems",
        },
        {
          label: "Mean Augmented",
          value: formatRate(summary.mean_augmented_pass_rate),
          detail: "pass@1 with memory injection",
        },
        {
          label: "Mean Improvement",
          value: formatDelta(summary.mean_improvement),
          detail: `${summary.helped_count} helped, ${summary.hurt_count} hurt`,
        },
      ];

      document.getElementById("summary").innerHTML = `
        <div class="summary-grid">
          ${cards.map((card) => `
            <article class="card">
              <p class="metric-label">${escapeHtml(card.label)}</p>
              <p class="metric-value">${escapeHtml(card.value)}</p>
              <p class="metric-detail">${escapeHtml(card.detail)}</p>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderProblemList(items, selectedProblem) {
      const list = document.getElementById("problem-list");
      document.getElementById("problem-counter").textContent = `${items.length}/${dataset.problem_count}`;

      if (!items.length) {
        list.innerHTML = `<div class="empty">No problems match the current filter.</div>`;
        return;
      }

      list.innerHTML = items.map((problem) => {
        const statement = problem.problem && problem.problem.statement ? problem.problem.statement : "";
        const improvement = problem.improvement;
        const improvementText = improvement === null || improvement === undefined ? "no eval" : formatDelta(improvement);
        return `
          <button class="problem-button ${selectedProblem && selectedProblem.problem_id === problem.problem_id ? "active" : ""}" data-problem-id="${escapeHtml(problem.problem_id)}">
            <div class="problem-header">
              <span class="problem-id">${escapeHtml(problem.problem_id)}</span>
              <span class="badge ${improvementBadgeClass(improvement)}">${escapeHtml(improvementText)}</span>
            </div>
            <p class="problem-snippet">${escapeHtml(summarizeText(statement, 96))}</p>
            <div class="chip-row">
              ${dataset.stage_order.map((stage) => stageChip(stage, problem.available_stages.includes(stage))).join("")}
            </div>
          </button>
        `;
      }).join("");

      list.querySelectorAll("[data-problem-id]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedProblemId = button.getAttribute("data-problem-id");
          if (state.activeView === "overview") {
            state.activeView = "problem";
          }
          render();
        });
      });
    }

    function renderTabs(problem) {
      const views = ["overview", "problem", ...dataset.stage_order];
      const container = document.getElementById("view-tabs");

      container.innerHTML = views.map((view) => {
        const hasStage = view === "overview" || view === "problem" || (problem && problem.available_stages.includes(view));
        return `
          <button class="tab-button ${state.activeView === view ? "active" : ""} ${hasStage ? "" : "dimmed"}" data-view="${view}">
            ${escapeHtml(STAGE_LABELS[view])}
          </button>
        `;
      }).join("");

      container.querySelectorAll("[data-view]").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeView = button.getAttribute("data-view");
          render();
        });
      });
    }

    function infoCard(label, value, detail = "") {
      return `
        <div class="kv-card">
          <strong>${escapeHtml(label)}</strong>
          <div>${escapeHtml(value)}</div>
          ${detail ? `<div class="muted" style="margin-top: 6px;">${escapeHtml(detail)}</div>` : ""}
        </div>
      `;
    }

    function renderPromptPanel(title, prompt) {
      if (!prompt || (!prompt.system_prompt && !prompt.user_prompt)) {
        return `<div class="empty">No prompt captured for ${escapeHtml(title.toLowerCase())}.</div>`;
      }
      return `
        <section class="panel">
          <h2>${escapeHtml(title)} Prompt</h2>
          <div class="stack" style="margin-top: 14px;">
            ${prompt.system_prompt ? `<div><p class="metric-label">System</p><pre>${escapeHtml(prompt.system_prompt)}</pre></div>` : ""}
            ${prompt.user_prompt ? `<div><p class="metric-label">User</p><pre>${escapeHtml(prompt.user_prompt)}</pre></div>` : ""}
          </div>
        </section>
      `;
    }

    function renderSolutionCards(label, solutions, scores = []) {
      if (!solutions || !solutions.length) {
        return `<div class="empty">No ${escapeHtml(label.toLowerCase())} captured.</div>`;
      }

      return `
        <div class="stack">
          ${solutions.map((solution, index) => {
            const score = scores[index];
            const details = score && score.details ? `<div style="margin-top: 14px;"><p class="metric-label">Score Details</p><pre>${escapeHtml(JSON.stringify(score.details, null, 2))}</pre></div>` : "";
            return `
              <details class="card details-card">
                <summary class="details-summary">
                  <div class="row-between">
                    <span class="problem-id">${escapeHtml(`${label} ${index + 1}`)}</span>
                    ${score ? `<span class="badge ${scoreBadgeClass(score.score, score.tier)}">${escapeHtml(`${score.tier || "score"} ${Number(score.score ?? 0).toFixed(2)}`)}</span>` : ""}
                  </div>
                  <div class="muted">${escapeHtml(summarizeText(solution, 180))}</div>
                </summary>
                <div style="margin-top: 14px;">
                  <pre>${escapeHtml(solution)}</pre>
                  ${details}
                </div>
              </details>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderScoreTable(scores) {
      if (!scores || !scores.length) {
        return `<div class="empty">No scores captured for this problem.</div>`;
      }
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Generation</th>
                <th>Score</th>
                <th>Tier</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody>
              ${scores.map((score) => `
                <tr>
                  <td>${escapeHtml(String((score.generation_index ?? 0) + 1))}</td>
                  <td>${escapeHtml(Number(score.score ?? 0).toFixed(2))}</td>
                  <td><span class="badge ${scoreBadgeClass(score.score, score.tier)}">${escapeHtml(score.tier || "n/a")}</span></td>
                  <td>${score.details ? `<span class="inline-code">${escapeHtml(JSON.stringify(score.details))}</span>` : "n/a"}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderOverview(items) {
      const summary = dataset.summary;
      const total = Math.max(dataset.problem_count, 1);
      return `
        <section class="panel">
          <h2 class="section-title">Overview</h2>
          <p class="section-subtitle">This view is scoped to one result-set path. Filter in the sidebar, then switch into generation, scoring, memory, or evaluation for a specific problem.</p>
          <div class="two-col">
            <div class="panel" style="margin: 0;">
              <h2>Stage Coverage</h2>
              <div class="bar-list" style="margin-top: 14px;">
                ${dataset.stage_order.map((stage) => {
                  const count = summary.stage_counts[stage] || 0;
                  const percent = Math.round((count / total) * 100);
                  return `
                    <div class="bar-row">
                      <div class="bar-meta">
                        <span>${escapeHtml(STAGE_LABELS[stage])}</span>
                        <span>${count}/${dataset.problem_count}</span>
                      </div>
                      <div class="bar-track"><div class="bar-fill" style="width: ${percent}%;"></div></div>
                    </div>
                  `;
                }).join("")}
              </div>
            </div>

            <div class="panel" style="margin: 0;">
              <h2>Evaluation Shape</h2>
              ${summary.evaluation_count ? `
                <div class="kv-grid" style="margin-top: 14px;">
                  ${infoCard("Helped", String(summary.helped_count), "positive improvement")}
                  ${infoCard("Hurt", String(summary.hurt_count), "negative improvement")}
                  ${infoCard("No Change", String(summary.no_change_count), "flat improvement")}
                  ${infoCard("Evaluated", String(summary.evaluation_count), "problems with evaluation output")}
                </div>
              ` : `<div class="empty" style="margin-top: 14px;">No evaluation records found in this result set.</div>`}
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>Problem Table</h2>
          <div class="table-wrap" style="margin-top: 14px;">
            <table>
              <thead>
                <tr>
                  <th>Problem</th>
                  <th>Stages</th>
                  <th>Memory</th>
                  <th>Baseline</th>
                  <th>Augmented</th>
                  <th>Delta</th>
                </tr>
              </thead>
              <tbody>
                ${items.map((problem) => `
                  <tr>
                    <td>${escapeHtml(problem.problem_id)}</td>
                    <td>${escapeHtml(problem.available_stages.join(", ") || "none")}</td>
                    <td>${problem.memory_skipped === true ? "skipped" : problem.memory_item_count ? `${problem.memory_item_count} items` : "n/a"}</td>
                    <td>${escapeHtml(formatRate(problem.baseline_pass_rate))}</td>
                    <td>${escapeHtml(formatRate(problem.augmented_pass_rate))}</td>
                    <td><span class="badge ${improvementBadgeClass(problem.improvement)}">${escapeHtml(formatDelta(problem.improvement))}</span></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function renderProblem(problem) {
      if (!problem) {
        return `<section class="panel"><div class="empty">No problem selected.</div></section>`;
      }

      const metadata = problem.problem && problem.problem.metadata ? problem.problem.metadata : null;
      const links = problem.links || {};
      return `
        <section class="panel">
          <h2 class="section-title">${escapeHtml(problem.problem_id)}</h2>
          <p class="section-subtitle">${escapeHtml(summarizeText(problem.problem.statement || "No problem statement captured.", 320))}</p>
          <div class="kv-grid">
            ${infoCard("Domain", problem.domain || dataset.domain || "unknown")}
            ${infoCard("Stages", String(problem.stage_count), problem.available_stages.join(", ") || "no stages")}
            ${infoCard("Expected Answer", problem.problem && problem.problem.answer ? String(problem.problem.answer) : "n/a")}
            ${infoCard("Generation Count", String(problem.generation_count))}
          </div>
          ${problem.problem && problem.problem.statement ? `<div style="margin-top: 16px;"><p class="metric-label">Statement</p><pre>${escapeHtml(problem.problem.statement)}</pre></div>` : ""}
          ${problem.problem && problem.problem.starter_code ? `<div style="margin-top: 16px;"><p class="metric-label">Starter Code</p><pre>${escapeHtml(problem.problem.starter_code)}</pre></div>` : ""}
          ${metadata ? `<div style="margin-top: 16px;"><p class="metric-label">Metadata</p><pre>${escapeHtml(JSON.stringify(metadata, null, 2))}</pre></div>` : ""}
          ${(links.artifact_json_uri || links.artifact_md_uri) ? `
            <div class="note">
              ${(links.artifact_json_uri ? `<a href="${escapeHtml(links.artifact_json_uri)}" target="_blank" rel="noreferrer">Open artifact.json</a>` : "")}
              ${(links.artifact_json_uri && links.artifact_md_uri) ? " ┬Ę " : ""}
              ${(links.artifact_md_uri ? `<a href="${escapeHtml(links.artifact_md_uri)}" target="_blank" rel="noreferrer">Open artifact.md</a>` : "")}
            </div>
          ` : ""}
        </section>
      `;
    }

    function renderGeneration(problem) {
      const generation = problem && problem.stages ? problem.stages.generation : null;
      if (!generation) {
        return `<section class="panel"><div class="empty">No generation data for this problem.</div></section>`;
      }
      return `
        ${renderPromptPanel("Generation", generation)}
        <section class="panel">
          <h2>Solutions</h2>
          <p class="section-subtitle">${generation.solutions ? generation.solutions.length : 0} sampled generations.</p>
          ${renderSolutionCards("Generation", generation.solutions || [], (problem.stages.scoring && problem.stages.scoring.scores) || [])}
        </section>
      `;
    }

    function renderScoring(problem) {
      const scoring = problem && problem.stages ? problem.stages.scoring : null;
      if (!scoring) {
        return `<section class="panel"><div class="empty">No scoring data for this problem.</div></section>`;
      }
      const scoreSummary = problem.score_summary || {};
      return `
        <section class="panel">
          <h2 class="section-title">Scoring</h2>
          <div class="kv-grid" style="margin-top: 14px;">
            ${infoCard("Scored Outputs", String(scoreSummary.count || 0))}
            ${infoCard("Mean Score", scoreSummary.mean_score === null || scoreSummary.mean_score === undefined ? "n/a" : Number(scoreSummary.mean_score).toFixed(3))}
            ${infoCard("Top Tier", scoreSummary.top_tier || "n/a")}
            ${infoCard("Tier Breakdown", scoreSummary.tier_breakdown || "n/a")}
          </div>
          <div style="margin-top: 16px;">
            ${renderScoreTable(scoring.scores || [])}
          </div>
        </section>
        ${(problem.stages.generation && problem.stages.generation.solutions) ? `
          <section class="panel">
            <h2>Scored Generations</h2>
            ${renderSolutionCards("Generation", problem.stages.generation.solutions || [], scoring.scores || [])}
          </section>
        ` : ""}
      `;
    }

    function renderMemory(problem) {
      const memory = problem && problem.stages ? problem.stages.memory : null;
      if (!memory) {
        return `<section class="panel"><div class="empty">No memory data for this problem.</div></section>`;
      }
      const grouped = memory.grouped_solutions || {};
      return `
        <section class="panel">
          <h2 class="section-title">Memory</h2>
          <div class="kv-grid" style="margin-top: 14px;">
            ${infoCard("Skipped", memory.skipped ? "true" : "false", memory.skip_reason || "")}
            ${infoCard("Memory Items", String((memory.items || []).length))}
          </div>
          ${memory.prompt ? `<div style="margin-top: 16px;"><p class="metric-label">Prompt</p><pre>${escapeHtml(memory.prompt)}</pre></div>` : ""}
          ${(memory.items || []).length ? `
            <div style="margin-top: 16px;">
              <p class="metric-label">Parsed Memory Items</p>
              <ol class="list-clean">
                ${(memory.items || []).map((item) => `
                  <li>
                    <strong>${escapeHtml(item.insight || "")}</strong>
                    ${item.reasoning ? `<div class="muted" style="margin-top: 6px;">${escapeHtml(item.reasoning)}</div>` : ""}
                  </li>
                `).join("")}
              </ol>
            </div>
          ` : `<div class="empty" style="margin-top: 16px;">No parsed memory items were stored for this problem.</div>`}
          ${memory.raw_response ? `<div style="margin-top: 16px;"><p class="metric-label">Raw Memory Response</p><pre>${escapeHtml(memory.raw_response)}</pre></div>` : ""}
        </section>

        <section class="panel">
          <h2>Grouped Solutions</h2>
          ${Object.keys(grouped).length ? `
            <div class="stack" style="margin-top: 14px;">
              ${Object.entries(grouped).map(([tier, solutions]) => `
                <div>
                  <p class="metric-label">${escapeHtml(tier)}</p>
                  ${renderSolutionCards(`${tier} attempt`, Array.isArray(solutions) ? solutions : [])}
                </div>
              `).join("")}
            </div>
          ` : `<div class="empty" style="margin-top: 14px;">No grouped solutions stored for this problem.</div>`}
        </section>
      `;
    }

    function renderEvaluation(problem) {
      const evaluation = problem && problem.stages ? problem.stages.evaluation : null;
      if (!evaluation) {
        return `<section class="panel"><div class="empty">No evaluation data for this problem.</div></section>`;
      }
      return `
        <section class="panel">
          <h2 class="section-title">Evaluation</h2>
          <div class="three-col" style="margin-top: 14px;">
            ${infoCard("Baseline pass@1", formatRate(evaluation.baseline_pass_rate))}
            ${infoCard("Augmented pass@1", formatRate(evaluation.augmented_pass_rate))}
            ${infoCard("Improvement", formatDelta(evaluation.improvement), evaluation.used_baseline_for_augmented ? "augmented reused baseline outputs" : "")}
          </div>
        </section>

        ${renderPromptPanel("Baseline", evaluation.baseline_prompt)}
        <section class="panel">
          <h2>Baseline Outputs</h2>
          ${renderSolutionCards("Baseline", evaluation.baseline_solutions || [], evaluation.baseline_results || [])}
        </section>

        ${(evaluation.augmented_prompt || (evaluation.augmented_solutions || []).length || (evaluation.augmented_results || []).length) ? `
          ${renderPromptPanel("Augmented", evaluation.augmented_prompt)}
          <section class="panel">
            <h2>Augmented Outputs</h2>
            ${renderSolutionCards("Augmented", evaluation.augmented_solutions || [], evaluation.augmented_results || [])}
          </section>
        ` : ""}
      `;
    }

    function renderContent(problem, items) {
      if (state.activeView === "overview") {
        return renderOverview(items);
      }
      if (state.activeView === "problem") {
        return renderProblem(problem);
      }
      if (state.activeView === "generation") {
        return renderGeneration(problem);
      }
      if (state.activeView === "scoring") {
        return renderScoring(problem);
      }
      if (state.activeView === "memory") {
        return renderMemory(problem);
      }
      if (state.activeView === "evaluation") {
        return renderEvaluation(problem);
      }
      return `<section class="panel"><div class="empty">Unknown view.</div></section>`;
    }

    function render() {
      const items = filteredProblems();
      const problem = ensureSelection(items);
      renderSummary();
      renderProblemList(items, problem);
      renderTabs(problem);
      document.getElementById("content").innerHTML = renderContent(problem, items);
    }

    render();
  </script>
</body>
</html>
