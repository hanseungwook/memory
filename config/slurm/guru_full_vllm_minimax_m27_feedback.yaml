dataset:
  domain: "guru"
  name: "LLM360/guru-RL-92k"
  split: "train"
llm:
  provider: "vllm"
  base_url: "http://127.0.0.1:8000/v1"
  api_key: "token"
  timeout_seconds: 300
  max_retries: 2
generation:
  model: "MiniMaxAI/MiniMax-M2.7"
  k: 16
  temperature: 1.0
  max_tokens: 4096
  extra_body:
    top_p: 0.95
    top_k: 50
  concurrent_requests: 128
scoring:
  timeout_seconds: 30
  max_output_length: 10000
memory:
  model: "MiniMaxAI/MiniMax-M2.7"
  max_tokens: 2048
  temperature: 1.0
  extra_body:
    top_p: 0.95
    top_k: 50
evaluation:
  model: "MiniMaxAI/MiniMax-M2.7"
  k: 16
  temperature: 1.0
  max_tokens: 4096
  extra_body:
    top_p: 0.95
    top_k: 50
  concurrent_requests: 128
concurrent_problems: 16
memory_mode: "feedback_loop"
feedback:
  max_iterations: 5
  improvement_threshold: 0.0
  concurrent_problems: 16
results_dir: "results/guru_20260420_full_vllm_minimax_m27_feedback"
resume: true
